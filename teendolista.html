<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teendő Lista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise"></div>

    <main class="container">
        <header class="header">
            <span class="header-tag">FELADATOK</span>
            <h1 class="title">Teendő<br><em>Lista</em></h1>
            <div class="counter-wrap">
                <span id="task-count">0</span>
                <span class="counter-label">feladat</span>
            </div>
        </header>

        <section class="input-section">
            <div class="input-wrap">
                <input
                    type="text"
                    id="task-input"
                    placeholder="Írj be egy új teendőt..."
                    autocomplete="off"
                />
                <button id="add-btn" aria-label="Hozzáadás">
                    <span class="btn-text">Hozzáadás</span>
                    <span class="btn-icon">→</span>
                </button>
            </div>
            <p class="hint" id="hint-msg"></p>
        </section>

        <section class="list-section">
            <ul id="task-list"></ul>
            <div class="empty-state" id="empty-state">
                <span class="empty-icon">✦</span>
                <p>Nincs még teendő</p>
            </div>
        </section>

        <footer class="footer">
            <button id="clear-btn" class="clear-btn">Kész feladatok törlése</button>
        </footer>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
