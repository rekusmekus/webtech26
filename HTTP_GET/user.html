<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Felhasználó adatlap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Felhasználó adatlap</h1>
    <a href="user-search.html">← Vissza a keresőhöz</a>
    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        const userId = new URLSearchParams(window.location.search).get('id');

        async function loadUser(id) {
            const res = await fetch('https://api.github.com/users/' + id, {
                headers: { 'Authorization': 'Bearer ' + GH_ACCESS_TOKEN }
            });
            const user = await res.json();
            const resultDiv = document.querySelector('#result');

          
resultDiv.innerHTML = `<div class="card">
    <img src="${user.avatar_url}" alt="${user.login}" width="100" height="100">
    <h2>${user.name || user.login}</h2>
</div>`;

const fields = [
    { label: 'Helyszín', value: user.location },
    { label: 'Bio', value: user.bio },
    { label: 'Blog', value: user.blog },
    { label: 'Publikus repók', value: user.public_repos },
    { label: 'Követők', value: user.followers },
];

const card = document.querySelector('.card');
for (const field of fields) {
    if (!field.value) continue;
    const fieldHTML = `<p>${field.label}: ${field.value}</p>`;
    card.innerHTML += fieldHTML;
}
        }

        if (userId) {
            loadUser(userId);
        } else {
            alert('Nincs megadva felhasználó!');
        }
    </script>
</body>
</html>
