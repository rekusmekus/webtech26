<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Felhasználó kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Felhasználó keresése</h1>
    <input type="text" id="user-search-input" placeholder="Felhasználó neve">
    <button class="btn btn-primary" id="search-btn">Keresés</button>
    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        function renderUsers(users) {
            const resultDiv = document.querySelector('#result');
            resultDiv.innerHTML = '';
            for (const user of users) {
                const userHtml = `<div class="card">
                    <a href="user.html?id=${user.login}">
                         <img src="${user.avatar_url}" alt="${user.login}" class="avatar-img">
                    </a>
                    <p>${user.login}</p>
                </div>`;
                resultDiv.innerHTML += userHtml;
            }
        }

        async function loadUsers(fieldText) {
            try {
                const res = await fetch('https://api.github.com/search/users?q=' + encodeURIComponent(fieldText), {
                    headers: { 'Authorization': 'Bearer ' + GH_ACCES_TOKEN }
                });
                if (!res.ok) {
                    throw Error('Hibás válasz, státuszkód:' + res.status);
                }
                const data = await res.json();
                sessionStorage.setItem('lastSearch', JSON.stringify(data.items));
                renderUsers(data.items);
            } catch (err) {
                console.error(err);
                alert('Hiba történt a keresés során');
            }
        }

        const saved = sessionStorage.getItem('lastSearch');
        if (saved) {
            renderUsers(JSON.parse(saved));
        }

        document.querySelector('#search-btn').addEventListener('click', () => {
            const fieldText = document.querySelector('#user-search-input').value;
            if (!fieldText) {
                alert('Hiba, adjon meg egy felhasználónevet!');
            } else {
                loadUsers(fieldText);
            }
        });
    </script>
</body>
</html>
