<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Felhasználó kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Felhasználó kereső</h1>
    <input type="text" id="user-search" placeholder="Felhasználó neve">

    <button class="btn btn-primary" id="user-search-btn">Keresés</button>

    <div id="result"></div>

    <script src="app.js"></script>
    <script>
            async function loadUsers(searchText){
            try{
                const res = await fetch('https://api.github.com/search/users?q='
                    +  encodeURIComponent(searchText), {
                        headers: {
                            'Authorization': 'Bearer ' + GH_ACCESS_TOKEN
                        }
                    });
                if (!res.ok){
                    throw Error('Hibás válasz, státusz:' + res.status);
                }

                const data = await res.json();
                let resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                for (const user of data.items){
                    const userHTML = `
                        <div class="card">
                            <img src="${user.avatar_url}" alt="${user.login}" width="80" height="80" style="border-radius: 50%;">
                            <br>
                            <a href="user.html?id=${encodeURIComponent(user.login)}">${user.login}</a>
                        </div>
                    `;
                    resultDiv.innerHTML += userHTML;
                }
            }catch (err){
                console.log(err);
                alert('Hiba történt a kérés során:/');
            }
            
        }


        const searchBtn = document.querySelector('#user-search-btn');
        searchBtn.addEventListener('click' , () => {
            const field = document.querySelector('#user-search');
            const fieldText = field.value
            if(!fieldText){
                alert("Hiba, nem adott meg felhasználónevet!");
            }else{
                loadUsers(fieldText);
            }
            
        });
    </script>
</body>
</html>
